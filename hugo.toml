baseURL = "https://Rui-RanYu.github.io/"
languageCode = "zh-cn"
title = "Ruiran Yu's Home Page"
theme = "PaperMod"

[pagination]
  pagerSize = 8

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Ruiran Yu's Home Page"
  description = "Senior AI Data Scientist @ P&G — Notes on AI, Supply Chain & Life"
  keywords = ["Blog", "AI", "Data Science", "Supply Chain"]
  author = "Ruiran Yu"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Hey 👋 I'm Ruiran Yu"
    Content = """
Senior AI Data Scientist @ Procter & Gamble.

Passionate about applying AI/ML to real-world supply chain challenges.

Writing about machine learning, optimization, data engineering, and life.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Rui-RanYu"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your@email.com"

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.editPost]
    URL = "https://github.com/Rui-RanYu/Rui-RanYu.github.io/tree/main/content"
    Text = "Suggest Changes"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "📝 Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "categories"
    name = "📂 Categories"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    identifier = "tags"
    name = "🏷️ Tags"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "🙋 About"
    url = "/about/"
    weight = 4
  [[menu.main]]
    identifier = "search"
    name = "🔍 Search"
    url = "/search/"
    weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
